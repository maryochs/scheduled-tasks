name: Test Setup

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check secrets are configured
        env:
          MY_WHATSAPP: ${{ secrets.MY_WHATSAPP }}
          OWM_API: ${{ secrets.OWM_API }}
          TWILIO_AUTH: ${{ secrets.TWILIO_AUTH }}
          TWILIO_SID: ${{ secrets.TWILIO_SID }}
          TWILIO_WHATSAPP_NUMBER: ${{ secrets.TWILIO_WHATSAPP_NUMBER }}
        run: |
          if [ -z "$MY_WHATSAPP" ]; then echo "MY_WHATSAPP secret is not set!"; exit 1; else echo "MY_WHATSAPP is configured"; fi
          if [ -z "$OWM_API" ]; then echo "OWM_API secret is not set!"; exit 1; else echo "OWM_API is configured"; fi
          if [ -z "$TWILIO_AUTH" ]; then echo "TWILIO_AUTH secret is not set!"; exit 1; else echo "TWILIO_AUTH is configured"; fi
          if [ -z "$TWILIO_SID" ]; then echo "TWILIO_SID secret is not set!"; exit 1; else echo "TWILIO_SID is configured"; fi
          if [ -z "$TWILIO_WHATSAPP_NUMBER" ]; then echo "TWILIO_WHATSAPP_NUMBER secret is not set!"; exit 1; else echo "TWILIO_WHATSAPP_NUMBER is configured"; fi
          echo "All secrets are configured!"

      - name: Check required files exist
        run: |
          [ -f "main.py" ] && echo "main.py found" || { echo "main.py not found!"; exit 1; }
          [ -f "requirements.txt" ] && echo "requirements.txt found" || { echo "requirements.txt not found!"; exit 1; }
          [ -f "birthdays.csv" ] && echo "birthdays.csv found" || { echo "birthdays.csv not found!"; exit 1; }
          echo "All required files found!"

      - name: Test Python syntax
        run: python -m py_compile main.py && echo "Python syntax OK"

      - name: Success
        run: |
          echo "========================================"
          echo "  All checks passed!"
          echo "  Your setup is ready to go."
          echo "========================================"
